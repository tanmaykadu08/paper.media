  <script>
    // Specific form submit logic for this page
    async function handleSubmit(event) {
      event.preventDefault();
      const form = document.getElementById("contactForm");
      const btn = form.querySelector('.form-btn');
      const data = {
        name: form.elements.name.value,
        email: form.elements.email.value,
        message: form.elements.message.value
      };
      const originalText = btn.textContent;
      btn.textContent = 'Sending...'; btn.style.opacity = '0.7'; btn.disabled = true;

      fetch(event.target.action, {
        method: form.method,
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
      })
      .then(response => {
        if (response.ok) {
          btn.textContent = 'Sent ✓'; btn.style.background = '#27ae60'; btn.style.opacity = '1'; form.reset();
          setTimeout(() => { btn.textContent = originalText; btn.style.background = ''; btn.disabled = false; }, 3000);
        } else {
          btn.textContent = 'Error!'; btn.style.background = '#e63946'; btn.style.opacity = '1';
          setTimeout(() => { btn.textContent = originalText; btn.style.background = ''; btn.disabled = false; }, 3000);
        }
      }).catch(() => {
        btn.textContent = 'Error!'; btn.style.background = '#e63946'; btn.style.opacity = '1';
        setTimeout(() => { btn.textContent = originalText; btn.style.background = ''; btn.disabled = false; }, 3000);
      });
    }
    document.getElementById("contactForm").addEventListener("submit", handleSubmit);
  </script>

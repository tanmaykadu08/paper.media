</head>

<body>

    </svg>

  <!-- NAV -->
  <nav id="navbar">
    <div class="logo">
      <a href="index.html"><img src="logo.png" alt="Paper.Media Logo" class="brand-logo"></a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="portfolio.html" class="active">Portfolio</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="contact.html" class="nav-cta magnetic">Get Started</a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- NAV OVERLAY -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- MOBILE NAV -->
  <div class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-header">
      <div class="logo">
        <img src="logo.png" alt="Logo" style="height: 30px;">
      </div>
    </div>
    <a href="index.html">Home</a>
    <a href="portfolio.html" class="active">Portfolio</a>
    <a href="services.html">Services</a>
    <a href="pricing.html">Pricing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="contact.html" class="mob-cta">Get Started →</a>
  </div>

  <!-- PORTFOLIO HERO -->
  <section class="section" style="padding-top: 150px;">
    <div class="container">
      <span class="section-label reveal">OUR WORK</span>
      <h2 class="section-title reveal">The Creative Showcase</h2>
      
      <div class="portfolio-grid" id="portfolioContainer" style="margin-top: var(--space-lg);">
        <div style="grid-column: 1/-1; text-align: center; padding: 100px 0; color: #888;">
          ⏳ Fetching cloud portfolio...
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-md);">
      <div class="footer-logo">
        <img src="logo.png" alt="Paper.Media Logo" style="height: 40px; width: auto;" loading="lazy" decoding="async">
      </div>
      <div class="footer-nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="footer-copy">© 2025 Paper.Media. All rights reserved.</div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    // Specific portfolio loading for this page
    async function loadFeatured(items = []) {
      const container = document.getElementById('portfolioContainer');
      const section = container.closest('section');
      if (!container) return;

      try {
        if (items.length === 0) {
          showEmptyState(container, section);
          return;
        }

        container.innerHTML = '';
        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'port-card spotlight-card reveal';

          let mediaContent = '';
          if (item.video_url) {
            mediaContent = `<video src="${item.video_url}" autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; border-radius:inherit;"></video>`;
          } else if (item.image_url) {
            mediaContent = `<img src="${item.image_url}" alt="${item.title || ''}" style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; border-radius:inherit;" loading="lazy" decoding="async">`;
          }

          card.innerHTML = `
          <div class="port-thumb" style="background:${item.bg_color || '#f5e6e8'}; position:relative; overflow:hidden;">
            ${mediaContent}
            ${(!item.video_url && !item.image_url) ? `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:48px;">${item.emoji || '📸'}</div>` : ''}
          </div>
          <div class="port-info">
            <span class="port-tag">${item.tag || 'Portfolio'}</span>
            <div class="port-name">${item.title || 'Portfolio Item'}</div>
          </div>
        `;
          container.appendChild(card);
        });
        
        section.style.paddingBottom = "var(--space-xxl)"; 
      } catch (error) {
        showEmptyState(container, section);
      }
    }

    function showEmptyState(container, section) {
      container.innerHTML = `
        <div class="portfolio-empty-state">
          <p>Projects coming soon.</p>
          <span>Currently building our first creative campaigns.</span>
        </div>
      `;
      if (section) section.style.paddingBottom = "60px";
    }
  </script>
</body>

</html>

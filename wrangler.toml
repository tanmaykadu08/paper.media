name            = "papermediaapi"
main            = "worker.js"
compatibility_date = "2024-01-01"

workers_dev = true

# ── Public vars (non-sensitive) ───────────────────────────────
[vars]
CLOUDINARY_CLOUD_NAME = "dvkelv5xv"

# ── Secrets — set with: wrangler secret put <NAME> ───────────
# TURSO_DATABASE_URL
# TURSO_AUTH_TOKEN
# CLOUDINARY_API_KEY
# CLOUDINARY_API_SECRET
# ADMIN_SECRET_KEY
# RESEND_API_KEY (optional, for sending emails via Resend)
# SENDGRID_API_KEY (optional, for sending emails via SendGrid)
# NOTIFICATION_EMAIL (optional, recipient for inquiry notifications)
# EMAIL_FROM (optional, sender email address)

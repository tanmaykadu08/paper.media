<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper.Media Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    /* Ensure no global hiding logic is affecting the dashboard */
    body { background: #f5f1ea; margin: 0; overflow-x: hidden; }
    
    /* Clean Admin Layout */
    .admin-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
    
    .sidebar {
      width: 260px;
      background: #ffffff;
      border-right: 1px solid var(--border);
      padding: 32px 16px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    
    #main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    
    .dashboard-home h1 {
      margin-bottom: 24px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      font-size: 18px;
      font-weight: 600;
    }
    
    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .admin-layout {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      #main-content {
        padding: 20px;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="admin-logo">Paper<span>.</span>Media <sub>CMS</sub></div>
      <nav class="nav-section" style="margin-top: 30px;">
        <button class="nav-btn active" data-module="dashboard" onclick="renderModule('dashboard')">🏠 Dashboard</button>
        <button class="nav-btn" data-module="homepage" onclick="renderModule('homepage')">📰 Homepage Hero</button>
        <button class="nav-btn" data-module="portfolio" onclick="renderModule('portfolio')">📁 Media Library</button>
        <button class="nav-btn" data-module="reviews" onclick="renderModule('reviews')">⭐ Client Reviews</button>
        <button class="nav-btn" data-module="services" onclick="renderModule('services')">⚡ Services</button>
        <button class="nav-btn" data-module="pricing" onclick="renderModule('pricing')">💰 Pricing Plans</button>
        <button class="nav-btn" data-module="about" onclick="renderModule('about')">📖 About Text</button>
        <button class="nav-btn" data-module="contact" onclick="renderModule('contact')">📞 Contact Info</button>
        <button class="nav-btn" data-module="appearance" onclick="renderModule('appearance')">🎨 Appearance</button>
        <button class="nav-btn logout-btn" onclick="logoutAdmin()" style="margin-top: 20px;">🚪 Logout</button>
      </nav>
    </aside>

    <main id="main-content">
      <div class="dashboard-home">
        <h1>Dashboard Overview</h1>
        <div class="stats-grid">
          <div class="card">Total Projects: 12</div>
          <div class="card">Total Inquiries: 5</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Clean Logout Function
    function logoutAdmin() {
      localStorage.removeItem("papermedia_admin_auth");
      window.location.href = "admin.html";
    }

    // AUTH CHECK AT THE VERY BOTTOM
    const auth = localStorage.getItem("papermedia_admin_auth");
    console.log("AUTH:", auth);

    if (auth !== "true") {
      window.location.href = "admin.html";
    }

  </script>
  <script src="admin-cms.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper.Media Admin | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    body {
      background: #f5f1ea;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <div class="admin-logo">Paper<span>.</span>Media <sub>CMS</sub></div>
    <p>Authentication Required</p>
    
    <div class="form-group">
      <input type="password" id="adminSecret" placeholder="Enter Secret Key" autofocus />
    </div>
    
    <button class="btn-primary" onclick="loginAdmin()" style="width:100%;">
      Access Dashboard
    </button>
  </div>

  <script>
    function loginAdmin() {
        const secret = document.getElementById("adminSecret").value.trim();

        if (secret === "papermediaadmin2026") {
            localStorage.setItem("papermedia_admin_auth", "true");
            localStorage.setItem("paper_admin_key", secret); // Added for API sync
            console.log("AUTH SAVED");
            window.location.href = "admin-dashboard.html";
        } else {
            alert("Invalid Secret Key");
        }
    }
  </script>

</body>
</html>
